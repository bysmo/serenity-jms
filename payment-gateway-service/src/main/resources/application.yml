server:
  port: 8087

spring:
  application:
    name: payment-gateway-service
  datasource:
    url: jdbc:postgresql://localhost:5438/serenity_payment
    username: serenity
    password: serenity123
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8180/realms/serenity/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

paydunya:
  base-url: https://app.paydunya.com/api/v1
  master-key: ""
  private-key: ""
  public-key: ""
  token: ""
  mode: test
  ipn-url: http://localhost:8087/api/v1/webhooks/paydunya/ipn

pispi:
  base-url: https://api.pispi.com/v1
  client-id: ""
  client-secret: ""
  api-key: ""
  paye-alias: ""
  mode: test

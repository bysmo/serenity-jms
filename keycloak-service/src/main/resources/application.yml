server:
  port: 8091

spring:
  application:
    name: keycloak-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8180/realms/serenity/protocol/openid-connect/certs

keycloak:
  realm: serenity
  server-url: http://localhost:8180
  admin-client-id: admin-cli
  admin-username: admin
  admin-password: admin

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    com.serenity.keycloak: DEBUG
    org.springframework.security: DEBUG
